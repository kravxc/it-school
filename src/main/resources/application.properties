spring.application.name=it.school
server.address=localhost

spring.datasource.url=jdbc:mysql://localhost:3306/it_school?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

server.port=8080

file.upload-dir=./uploads
file.base-url=http://localhost:8080/api/files/download/

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

jwt.secret=mySecretKeyForJWTGenerationMySecretKeyForJWTGeneration1234567890
jwt.expiration=86400000